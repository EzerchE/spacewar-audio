# Minimum utilization clamp applied to Android's existing RT CPU cgroup.
# Android represents 20 percent as 20.00 in this cgroup interface.
RT_UCLAMP_MIN=20.00

# Restore captured ROM defaults after playback remains stopped for this long.
IDLE_GRACE_SECONDS=30

# Finite event-triggered rechecks after an A2DP stream starts.
START_BURST_DELAYS="1 3 10"

# Debounce codec events that can arrive in bursts.
MEDIA_APPLY_DEBOUNCE_SECONDS=2

# Re-apply media thread placement after Android changes app groups during
# activity and screen-state transitions. This runs only while A2DP is active.
MEDIA_REAPPLY_DELAY_SECONDS=1

# Restart delay only if the blocking logcat listener exits unexpectedly.
EVENT_RESTART_DELAY_SECONDS=5

# Rotate guardian.log at this size and retain two older files.
MAX_LOG_SIZE_KB=256
LOG_THREAD_MOVES=0
UNDERFLOW_PERSIST_EVERY=8

# Core Android processes. Process names may be adjusted for vendor ROMs.
CORE_AUDIO_PROCESSES="audioserver"
AUDIO_HAL_PROCESSES="android.hardware.audio.service android.hardware.audio.service-aidl android.hardware.audio@7.1-service android.hardware.audio@7.0-service android.hardware.audio@6.0-service"
BLUETOOTH_PROCESSES="com.android.bluetooth"

# Space-separated media packages whose audio threads may be protected.
MEDIA_PACKAGES="com.spotify.music"

# Use Android's documented software A2DP path. Vendor-specific offload
# properties are intentionally not forced because they are build-dependent.
A2DP_OFFLOAD_DISABLED=true
